display_information:
  name: Auto Translator
  description: Context-aware two-way Slack translation
features:
  bot_user:
    display_name: translator
    always_online: true
  slash_commands:
    - command: /tr-setlang
      description: Set my reading language for this conversation
      usage_hint: "<lang>"
      should_escape: false
    - command: /tr-target
      description: Force outgoing target language (use 'auto' to clear)
      usage_hint: "<lang|auto>"
      should_escape: false
    - command: /tr-toggle
      description: Enable or disable translation in this conversation
      should_escape: false
    - command: /tr-status
      description: Show translation settings for this conversation
      should_escape: false
oauth_config:
  scopes:
    bot:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - chat:write
      - chat:write.customize   # post incoming translations under the sender's name/avatar
      - users:read             # resolve the sender's display name + avatar
      - commands
      - reactions:read
    user:
      - chat:write
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - reactions:read
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
